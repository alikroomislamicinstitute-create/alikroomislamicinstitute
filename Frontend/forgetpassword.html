<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Al-Ikroom Islamic Institute</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ===== THEME VARIABLES ===== */
        :root {
            --primary-green: #1b6e5f;
            --dark-navy: #0a143c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #0a143c;
            --text-muted: #666;
            --input-bg: #ffffff;
            --input-border: #edf2f1;
        }

        [data-theme="dark"] {
            --primary-green: #2ab098;
            --dark-navy: #050a1f;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --input-bg: #0f172a;
            --input-border: #334155;
        }

        body {
            margin: 0; 
            /* Requirement 2: Font changed to New Times Roman */
            font-family: 'Times New Roman', Times, serif;
            background: var(--bg-color);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
            transition: background 0.3s ease;
        }

        .reset-card {
            background: var(--card-bg); padding: 40px; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%; max-width: 400px; text-align: center;
            transition: background 0.3s ease;
            position: relative;
        }

        .lang-switch {
            position: absolute; top: 15px; right: 20px;
            background: none; border: none; color: var(--primary-green);
            font-weight: 600; cursor: pointer; font-size: 0.9rem;
            font-family: inherit;
        }

        .reset-card h2 { color: var(--primary-green); margin-bottom: 10px; font-size: 1.8rem; }
        .reset-card p { color: var(--text-muted); font-size: 1rem; margin-bottom: 25px; line-height: 1.4; }

        input {
            width: 100%; padding: 14px; margin-bottom: 20px;
            border: 2px solid var(--input-border); border-radius: 12px;
            box-sizing: border-box; font-family: inherit;
            background: var(--input-bg); color: var(--text-main);
            transition: 0.3s; font-size: 1rem;
        }

        input:focus { outline: none; border-color: var(--primary-green); }

        .btn-reset {
            width: 100%; padding: 15px; background: var(--primary-green);
            color: white; border: none; border-radius: 50px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
            font-family: inherit; font-size: 1.1rem;
        }

        .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(27, 110, 95, 0.3); }

        .back-link { display: block; margin-top: 20px; color: var(--text-muted); text-decoration: none; font-size: 0.95rem; }
        .back-link:hover { color: var(--primary-green); }

        .success-msg { color: #27ae60; display: none; margin-bottom: 20px; font-weight: 600; }
        
        [dir="rtl"] .back-link { direction: rtl; }
    </style>
</head>
<body>

<div class="reset-card">
    <button class="lang-switch" id="langToggle">العربية</button>
    <i class="fas fa-lock-open" style="font-size: 3rem; color: var(--primary-green); margin-bottom: 15px;"></i>
    <h2 id="resetTitle">Forgot Password?</h2>
    <p id="resetDesc">Enter your email and we'll send you a link to reset your password.</p>
    
    <div id="successMsg" class="success-msg">Reset link sent! Check your inbox.</div>

    <form id="resetForm">
        <input type="email" id="resetEmail" placeholder="Email Address" required>
        <button type="submit" class="btn-reset" id="btnSubmit">Send Reset Link</button>
    </form>

    <a href="login.html" class="back-link" id="backLogin">← Back to Login</a>
</div>


<script>
// Paste the custom-alerts logic directly here
(function() {
    const style = document.createElement('style');
    style.innerHTML = `
        .als-alert-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .als-alert-overlay.active { display: flex; }
        .als-alert-box { background: var(--card-bg, #fff); padding: 35px; border-radius: 35px; text-align: center; max-width: 420px; width: 90%; border-top: 6px solid var(--primary-green); }
        .als-alert-btn { width: 100%; padding: 14px; background: var(--primary-green); color: #fff; border: none; border-radius: 50px; cursor: pointer; margin-top: 20px; }
    `;
    document.head.appendChild(style);

    window.alert = function(message) {
        const overlay = document.createElement('div');
        overlay.className = 'als-alert-overlay active';
        overlay.innerHTML = `
            <div class="als-alert-box">
                <i class="fas fa-exclamation-circle" style="font-size:3rem; color:var(--primary-green);"></i>
                <div style="font-size:1.4rem; font-weight:700; margin: 15px 0; color:var(--primary-green);">Notification</div>
                <div style="line-height:1.5;">${message}</div>
                <button class="als-alert-btn">Understood</button>
            </div>
        `;
        document.body.appendChild(overlay);
        overlay.querySelector('button').onclick = () => document.body.removeChild(overlay);
    };
})();
</script>


<script>
    /* Requirement 1: Removed Firebase imports and initialization */

    // Theme Sync
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);

    const resetForm = document.getElementById('resetForm');
    const btn = document.getElementById('btnSubmit');
    const success = document.getElementById('successMsg');

    resetForm.onsubmit = (e) => {
        e.preventDefault();
        // Mocking the behavior without Firebase
        btn.disabled = true;
        const originalText = btn.innerText;
        btn.innerText = isArabic ? "...جاري الإرسال" : "Sending...";

        setTimeout(() => {
            success.style.display = "block";
            resetForm.style.display = "none";
            success.innerText = isArabic ? "تم إرسال رابط إعادة التعيين! تحقق من بريدك الإلكتروني." : "Reset link sent! Check your inbox.";
        }, 1500);
    };

    /* Requirement 3: TRANSLATION LOGIC */
    const langBtn = document.getElementById('langToggle');
    let isArabic = false;

    const texts = {
        ar: {
            title: "نسيت كلمة المرور؟",
            desc: "أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور الخاصة بك.",
            emailPlc: "البريد الإلكتروني",
            btn: "إرسال رابط التعيين",
            back: "العودة لتسجيل الدخول →",
            toggle: "English"
        },
        en: {
            title: "Forgot Password?",
            desc: "Enter your email and we'll send you a link to reset your password.",
            emailPlc: "Email Address",
            btn: "Send Reset Link",
            back: "← Back to Login",
            toggle: "العربية"
        }
    };

    langBtn.onclick = () => {
        isArabic = !isArabic;
        const d = texts[isArabic ? 'ar' : 'en'];
        document.body.dir = isArabic ? 'rtl' : 'ltr';
        
        document.getElementById('resetTitle').textContent = d.title;
        document.getElementById('resetDesc').textContent = d.desc;
        document.getElementById('resetEmail').placeholder = d.emailPlc;
        document.getElementById('btnSubmit').textContent = d.btn;
        document.getElementById('backLogin').textContent = d.back;
        langBtn.textContent = d.toggle;
    };
</script>

</body>
</html>
