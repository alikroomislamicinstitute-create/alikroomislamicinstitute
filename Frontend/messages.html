/**
 * Handles the visual simulation of downloading media.
 * Swaps the loader for the actual player when finished.
 */
function handleDownloadAnimation(msgId) {
    const container = document.querySelector(`#msg-${msgId} .download-track`);
    const bar = document.querySelector(`#msg-${msgId} .download-progress-bar`);
    const mediaContent = document.querySelector(`#msg-${msgId} .actual-media-content`);
    const loaderText = document.querySelector(`#msg-${msgId} .loader-text`);
    const loaderBox = document.querySelector(`#msg-${msgId} .media-loader-box`);

    let progress = 0;
    const interval = setInterval(() => {
        progress += Math.random() * 25; 
        if (bar) bar.style.width = Math.min(progress, 100) + '%';

        if (progress >= 100) {
            clearInterval(interval);
            
            setTimeout(() => {
                if (container) container.style.display = 'none';
                if (loaderText) loaderText.style.display = 'none';
                
                if (mediaContent) {
                    const placeholder = mediaContent.querySelector('.voice-note-placeholder');
                    
                    if (placeholder && loaderBox) {
                        // Retrieve the URL we stored in Step 1
                        const fileUrl = loaderBox.dataset.url;
                        
                        // Reconstruct the Waveform UI
                        const barsCount = 25;
                        let barsHtml = '';
                        for (let i = 0; i < barsCount; i++) {
                            const h = Math.floor(Math.random() * 15) + 5;
                            barsHtml += `<span style="height:${h}px"></span>`;
                        }

                        // Replace the "Ready" text with the actual Audio Player
                        placeholder.outerHTML = `
                            <div class="voice-note" id="vn-${msgId}">
                                <button class="play-btn" onclick="toggleVN('${msgId}', this)">
                                    <i class="fa-solid fa-play"></i>
                                </button>
                                <div class="waveform" id="wave-${msgId}" 
                                     onmousedown="startSeek(event, '${msgId}')" 
                                     ontouchstart="startSeek(event, '${msgId}')"
                                     style="cursor: pointer; position: relative; padding: 5px 0;">
                                     ${barsHtml}
                                </div>
                                <audio id="audio-${msgId}" src="${fileUrl}" 
                                    ontimeupdate="syncWave('${msgId}')" 
                                    onended="resetVN('${msgId}')"
                                    onloadedmetadata="const d=formatDuration(this.duration); document.getElementById('duration-${msgId}').innerText=d;">
                                </audio>
                                <span class="voice-duration" id="duration-${msgId}">0:00</span>
                            </div>`;
                    }

                    // Reveal the media with a smooth animation
                    mediaContent.style.display = 'block';
                    mediaContent.style.opacity = '0';
                    mediaContent.animate(
                        [{ opacity: 0 }, { opacity: 1 }], 
                        { duration: 400, fill: 'forwards' }
                    );
                }
            }, 400);
        }
    }, 150);
}

function simulateDownload(msgId) {
    const bubble = document.querySelector(`#msg-${msgId} .bubble`);
    if(!bubble) return;

    const downloadHTML = `
        <div class="media-progress-container" id="dl-cont-${msgId}">
            <div class="media-progress-bar" id="dl-bar-${msgId}"></div>
        </div>`;
    bubble.insertAdjacentHTML('beforeend', downloadHTML);

    let progress = 0;
    const interval = setInterval(() => {
        progress += Math.random() * 30;
        const bar = document.getElementById(`dl-bar-${msgId}`);
        if(bar) bar.style.width = Math.min(progress, 100) + '%';
        
        if(progress >= 100) {
            clearInterval(interval);
            setTimeout(() => {
                document.getElementById(`dl-cont-${msgId}`)?.remove();
            }, 500);
        }
    }, 200);
}

async function loadChatHistory(otherId) {  
    const historyContainer = document.getElementById('messageHistory');  
    historyContainer.innerHTML = '<p style="text-align:center; opacity:0.5; padding:20px;">Loading history...</p>';  
  
    try {  
        const token = localStorage.getItem('token');  
  
        const res = await fetch(`${API_BASE}/auth/chat-history/${otherId}`, {  
            headers: { 'Authorization': `Bearer ${token}` }  
        });  
  
        const data = await res.json();  
  
        historyContainer.innerHTML = '';  
  
        // Safely resolve history array (prevents crash if backend shape differs)  
        const history = data.history || data || [];  
  
        if (Array.isArray(history)) {  
            history.forEach(msg => {  
                // Support both sender formats for robustness  
                const isMe =  
                    msg.sender === currentUserId ||  
                    msg.senderId === currentUserId;  
  
                displayMessage(msg, isMe ? 'sent' : 'received');  
            });  
        } else {  
            console.warn("Invalid chat history format:", data);  
        }  
  
    } catch (err) {  
        console.error("History error:", err);  
        historyContainer.innerHTML = '<p style="text-align:center; opacity:0.5; padding:20px;">Failed to load chat history</p>';  
    }  
}  
function displayMessage(msg, type) {

            color = '#34b7f1';  
        }  
  
        statusHTML = `  
            <span class="msg-status" id="status-${msgId}" style="font-size:11px; margin-left:5px; color:${color}">

            </span>`;  
    }  
  
    // ---------------- BUBBLE ASSEMBLY ----------------  
    const bubble = document.createElement('div');  
    bubble.className = `bubble ${type === 'sent' ? 'sent-bubble' : 'received-bubble'} ${isMedia ? 'media-bubble' : ''}`;  
  
    // Listeners
    bubble.addEventListener('touchstart', (e) => handleSwipeStart(e), {passive: true});  
    bubble.addEventListener('touchmove', (e) => handleSwipeMove(e, bubble, msg), {passive: false});  
    bubble.addEventListener('touchend', () => handleSwipeEnd(bubble));  
  
    bubble.onmousedown = (e) => handlePress(msgId);  
    bubble.onmouseup = (e) => endPress(e, msgId);  
  
    bubble.onclick = (e) => {  
        if (selectedMsgIds.length > 0) {  
            e.preventDefault();  
            e.stopPropagation();  
        }  
    };  
  
    bubble.oncontextmenu = (e) => {  
        e.preventDefault();  
        toggleSelect(msgId);  
    };  
  
    bubble.innerHTML = `  
        ${replyHTML}  
        ${content}  
        <div style="display:flex; justify-content:flex-end; align-items:center; gap:5px;">  
            <span class="time">${time}</span>  
            ${statusHTML}  
        </div>`;  
  
    div.appendChild(bubble);  
    chatBox.appendChild(div);  
      
    requestAnimationFrame(() => {  
        chatBox.scrollTop = chatBox.scrollHeight;  
    });  
}

async function downloadMedia(url, filename) {
    try {
        // 1. Fetch the data
        const response = await fetch(url);
        if (!response.ok) throw new Error('Download failed');
        
        // 2. Convert to a Blob (Binary Large Object)
        const blob = await response.blob();
        
        // 3. Create a temporary local URL for the blob
        const blobUrl = window.URL.createObjectURL(blob);
        
        // 4. Create a hidden anchor element
        const link = document.createElement('a');
        link.href = blobUrl;
        link.download = filename || 'video.mp4'; // This attribute forces download
        
        // 5. Append, click, and cleanup
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        // 6. Revoke the URL to free up memory
        window.URL.revokeObjectURL(blobUrl);
    } catch (err) {
        console.error("Force download failed:", err);
        // Fallback: only open in new tab if the fetch fails (e.g., CORS issues)
        window.open(url, '_blank');
    }
}

// 1. Check file size before download
async function fetchSize(url, elementId) {
    try {
        const response = await fetch(url, { method: 'HEAD' });
        const size = response.headers.get('content-length');
        if (size) {
            const mb = (size / (1024 * 1024)).toFixed(2);
            document.getElementById(elementId).innerText = `${mb} MB`;
        }
    } catch (e) { document.getElementById(elementId).innerText = "Size Unknown"; }
}

// 2. The "Whole Download" and Save Logic
async function saveToLocal(msgId, url) {
    const progressTrack = document.getElementById(`dt-${msgId}`);
    const progressBar = document.getElementById(`dpb-${msgId}`);
    const overlayIcon = document.querySelector(`#overlay-${msgId} i`);
    
    progressTrack.style.display = 'block';
    
    try {
        const response = await fetch(url);
        const reader = response.body.getReader();
        const contentLength = +response.headers.get('Content-Length');
        
        let receivedLength = 0;
        let chunks = []; 
        
        while(true) {
            const {done, value} = await reader.read();
            if (done) break;
            chunks.push(value);
            receivedLength += value.length;
            
            // Update UI progress
            let step = (receivedLength / contentLength) * 100;
            progressBar.style.width = step + '%';
        }

        // Combine chunks into a single Blob (The "Whole" file)
        const blob = new Blob(chunks);
        
        // SAVE TO BROWSER DATABASE (IndexedDB)
        const dbRequest = indexedDB.open("AlIkroomMedia", 1);
        dbRequest.onupgradeneeded = e => e.target.result.createObjectStore("videos");
        
        dbRequest.onsuccess = e => {
            const db = e.target.result;
            const transaction = db.transaction("videos", "readwrite");
            transaction.objectStore("videos").put(blob, url); // Map URL to the Blob
            
            // UI Feedback
            overlayIcon.className = 'fa-solid fa-play';
            progressTrack.style.display = 'none';
            alert("Video saved offline! No more reloading needed.");
        };

    } catch (err) {
        alert("Download failed. Check your connection.");
        progressTrack.style.display = 'none';
    }
}

// 3. Smart Play: Check Database first, then Network
async function handleVideoClick(msgId, url) {
    const dbRequest = indexedDB.open("AlIkroomMedia", 1);
    
    dbRequest.onsuccess = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains("videos")) {
            openMediaModal(url, 'video'); // Fallback to stream
            return;
        }

        const transaction = db.transaction("videos", "readonly");
        const getRequest = transaction.objectStore("videos").get(url);

        getRequest.onsuccess = () => {
            if (getRequest.result) {
                // FILE FOUND LOCALLY!
                const localUrl = URL.createObjectURL(getRequest.result);
                openMediaModal(localUrl, 'video');
            } else {
                // NOT DOWNLOADED YET
                alert("Please click the DOWNLOAD button to watch without breaking.");
            }
        };
    };
}
  
let isSeeking = false;  
  
function startSeek(e, msgId) {  
    isSeeking = true;  
    handleSeek(e, msgId);  
  
    // Desktop mouse move  
    const moveHandler = (moveEvent) => {  
        if (isSeeking) handleSeek(moveEvent, msgId);  
    };  
  
    // Stop seeking on mouse up  
    const stopHandler = () => {  
        isSeeking = false;  
        window.removeEventListener('mousemove', moveHandler);  
        window.removeEventListener('mouseup', stopHandler);  
    };  
  
    window.addEventListener('mousemove', moveHandler);  
    window.addEventListener('mouseup', stopHandler);  
      
    // Mobile touch move  
    const touchMoveHandler = (touchEvent) => {  
        if (isSeeking) handleSeek(touchEvent, msgId);  
    };  
      
    const touchEndHandler = () => {  
        isSeeking = false;  
        window.removeEventListener('touchmove', touchMoveHandler);  
        window.removeEventListener('touchend', touchEndHandler);  
    };  
  
    window.addEventListener('touchmove', touchMoveHandler, { passive: false });  
    window.addEventListener('touchend', touchEndHandler);  
}  
  
function handleSeek(e, msgId) {  
    const audio = document.getElementById(`audio-${msgId}`);  
    const wave = document.getElementById(`wave-${msgId}`);  
    if (!audio || !wave || !audio.duration) return;  
  
    // Prevent scrolling on mobile while seeking  
    if (e.type === 'touchmove') e.preventDefault();  
  
    const rect = wave.getBoundingClientRect();  
    const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;  
      
    let x = clientX - rect.left; // x position within the element  
    let percentage = x / rect.width;  
  
    // Constrain between 0 and 1  
    percentage = Math.max(0, Math.min(1, percentage));  
  
    // Update audio time  
    audio.currentTime = percentage * audio.duration;  
      
    // Immediately sync the bars for visual feedback  
    syncWave(msgId);  
}

function syncWave(msgId) {  
    const audio = document.getElementById(`audio-${msgId}`);  
    const wave = document.getElementById(`wave-${msgId}`);  
    if (!audio || !wave) return;  
  
    const bars = wave.querySelectorAll('span');  
    const progress = (audio.currentTime / audio.duration) * bars.length;  
      
    bars.forEach((bar, index) => {  
        // Fill color based on progress  
        if (index < progress) {  
            bar.classList.add('active');  
        } else {  
            bar.classList.remove('active');  
        }  
  
        // Animate only the active bar while playing  
        if (index === Math.floor(progress) && !audio.paused) {  
            bar.classList.add('playing');  
        } else {  
            bar.classList.remove('playing');  
        }  
    });  
}  
  
function resetVN(msgId) {

    const wave = document.getElementById(`wave-${msgId}`);  
    const btn = audio.parentElement.querySelector('.play-btn i');

function handlePress(msgId) {  
    // If we are ALREADY in selection mode, ignore the long-press timer  
    // because a simple click (handled in endPress) will toggle it.  
    if (selectedMsgIds.length > 0) return;  
  
    isLongPress = false;

        if (!isLongPress) {  
            if (e.cancelable) e.preventDefault();  
            toggleSelect(msgId);  
        }  
    }  
    // Reset state for next interaction  
    isLongPress = false;  
    longPressTarget = null;

function handleSwipeStart(e) {  
    touchStartX = e.touches[0].clientX;  
}  
  
function handleSwipeMove(e, element, msg) {  
    if (!touchStartX) return;  
  
    const touchX = e.touches[0].clientX;  
    const diff = touchX - touchStartX;  
  
    if (diff > 0 && diff < 100) {  
        element.style.transform = `translateX(${diff}px)`;  
    }  
  
    if (diff >= 70) {  
        touchStartX = 0;  
        element.style.transform = "translateX(0px)";  
        setReply(msg);  
    }  
}  
  
function handleSwipeEnd(element) {  
    element.style.transition = "transform 0.25s ease";  
    element.style.transform = "translateX(0px)";  
  
    setTimeout(() => {  
        element.style.transition = "";  
    }, 250);  
}

    const bars = wave.querySelectorAll('span');  
    bars.forEach((b, i) => {  
        setTimeout(() => b.classList.add('wave-active'), i * 50);  
    });  
  
    currentAudio.onended = () => {  
        bars.forEach(b => b.classList.remove('wave-active'));  
    };  
}  
  
function formatDuration(sec) {  
    if (!sec || isNaN(sec)) return "0:00";  
    const m = Math.floor(sec / 60);  
    const s = Math.floor(sec % 60);  
    return `${m}:${s < 10 ? '0' : ''}${s}`;  
}  
  
function stopRecording(discard = false) {  
    if (!mediaRecorder) return;  
  
    mediaRecorder.stop();  
    mediaRecorder.stream.getTracks().forEach(track => track.stop());  
  
    clearInterval(recordInterval);  
    hideRecordingUI();  
  
    if (discard) {  
        audioChunks = []; // cancel send  
        return;  
    }  
}  
  
async function uploadVoiceNote() {  
    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });  
    console.log("Audio size:", audioBlob.size);  
    const file = new File([audioBlob], `voicenote-${Date.now()}.webm`, {  
        type: 'audio/webm'  
    });  
  
    const formData = new FormData();  
    formData.append('file', file);  
  
    try {  
        const token = localStorage.getItem('token');  
        const response = await fetch(`${API_BASE}/messages/upload`, {  
            method: 'POST',  
            headers: { 'Authorization': `Bearer ${token}` },  
            body: formData  
        });  
  
        const data = await response.json();  
  
        const messageData = {  
            senderId: currentUserId,  
            recipientId: activeChatUser,  
            fileUrl: data.url,  
            fileName: data.name,  
            fileType: 'audio'  
        };  
  
        socket.emit('send_private_message', messageData);  
          
        // FIX: Removed the 'input.value' line.   
        // If you want to clear the text box, use:  
        // document.getElementById("msgText").value = "";  
  
    } catch (err) {  
        console.error("Voice upload failed:", err);  
    }  
}  
  
function showRecordingUI() {  
    document.getElementById('recordingUI').style.display = 'flex';  
    document.getElementById('msgText').style.display = 'none';  
    document.getElementById('micBtn').style.color = '#ef4444';  
}  
  
function hideRecordingUI() {  
    document.getElementById('recordingUI').style.display = 'none';  
    document.getElementById('msgText').style.display = 'block';  
    document.getElementById('micBtn').style.color = 'var(--primary-green)';  
}  
  
function openMediaModal(url, type) {  
    const modal = document.getElementById('mediaModal');  
    const content = document.getElementById('modalContent');  
  
    modal.style.display = 'flex';  
  
    if(type === 'image') {  
        content.innerHTML = `<img src="${url}">`;  
    } else {  
        content.innerHTML = `  
            <video controls autoplay playsinline style="max-width:100%; max-height:90vh; border-radius:10px;">  
                <source src="${url}">  
            </video>  
        `;  
    }  
}  
  
function closeMediaModal() {  
    document.getElementById('mediaModal').style.display = 'none';  
    document.getElementById('modalContent').innerHTML = '';  
}  
  
  
// --- SOCKET UPDATES FOR LIVE DELETION/EDITS ---  
socket.on('message-updated', (data) => {  
    const textEl = document.getElementById(`text-${data.messageId}`);  
    if (textEl) textEl.innerText = data.newText + " (edited)";  
});  
  
// Listen for mass deletions from other users
socket.on('messages-deleted', (data) => {  
    if (data.ids && Array.isArray(data.ids)) {
        data.ids.forEach(id => {  
            const el = document.getElementById(`msg-${id}`);  
            if (el) el.remove();  
        });  
    }
});
    
async function uploadFile(input) {
    const file = input.files[0];
    if (!file || !activeChatUser) return;

    const tempId = 'up-' + Date.now();
    
    // Inject placeholder bubble for sender
    displayMessage({
        _id: tempId,
        text: `Sending ${file.name}...`,
        status: 'pending',
        timestamp: new Date(),
        isPlaceholder: true 
    }, 'sent');

    const formData = new FormData();
    formData.append('file', file);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', `${API_BASE}/messages/upload`, true);
    xhr.setRequestHeader('Authorization', `Bearer ${localStorage.getItem('token')}`);

    // Update the progress bar width based on upload %
    xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            const progressEl = document.querySelector(`#msg-${tempId} .upload-progress-bar`);
            if (progressEl) {
                progressEl.style.width = percent + '%';
                // Optional: Update text to show percentage
                const textEl = document.querySelector(`#msg-${tempId} p`);
                if(textEl) textEl.innerText = `Uploading ${percent}%`;
            }
        }
    };

    xhr.onload = function() {
        if (xhr.status === 200) {
            const data = JSON.parse(xhr.responseText);
            socket.emit('send_private_message', {
                senderId: currentUserId,
                recipientId: activeChatUser,
                fileUrl: data.url,
                fileName: data.name,
                fileType: getFileType(file.name)
            });
            // Remove progress placeholder
            document.getElementById(`msg-${tempId}`)?.remove();
        }
    };
    xhr.send(formData);
}

function getFileType(filename) {  
    const ext = filename.split('.').pop().toLowerCase();  
  
    if (['jpg','jpeg','png','gif','webp'].includes(ext)) return 'image';  
    if (['mp4','webm','mov'].includes(ext)) return 'video';  
    if (['mp3','wav','m4a','ogg'].includes(ext)) return 'audio';  
    return 'file';  
}  
  
function goToDashboard() {  
    window.location.href = userRole === 'teacher' ? 'dashboard-teacher.html' : 'dashboard-student.html';  
}  
  
function toggleTheme() {  
    const current = document.documentElement.getAttribute('data-theme');  
    const target = current === 'light' ? 'dark' : 'light';  
    document.documentElement.setAttribute('data-theme', target);  
    localStorage.setItem('theme', target);  
}  
  
function closeChat() {  
    document.getElementById('bodyWrapper').classList.remove('chat-active');  
    activeChatUser = null;  
}  
  
function showNotificationDot(senderId) {  
    const dot = document.getElementById(`dot-${senderId}`);  
    if (dot) dot.style.display = 'block';  
}
